name: Probe parametros Nomus (sem base64)

# Disparo manual apenas. Investiga se a API do Nomus aceita algum parametro que
# omita os anexos base64 da listagem, atacando o gargalo de ~72 GB/varredura.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Probe parametros do Nomus
        env:
          NOMUS_API_KEY: ${{ secrets.NOMUS_API_KEY }}
        run: node .github/scripts/probe-nomus.mjs
