name: Extrator OCR (passo caro isolado)

# Passo OCR DEDICADO da camada 1 (decisao Fabio 2026-06-15). Separa o pipeline
# RAPIDO (PDF nativo/docx/xlsx, OCR off) do OCR caro (escaneado/imagem):
#
#   - O passo rapido (extrair-anexos.yml, EXTRACAO_MODO=rapido) roda com OCR OFF
#     e marca os anexos que so dariam texto via OCR como status 'precisa_ocr'.
#   - Este workflow drena ESSA fila (EXTRACAO_MODO=ocr) com OCR LIGADO, em LOTE
#     PEQUENO + healthcheck do Tika, para que um escaneado grande/travado nao
#     contamine o pipeline rapido nem queime o budget em timeouts encadeados.
#
# Mesmo motor (Apache Tika `full` efemero) e mesmo orquestrador
# (.github/scripts/extrair-anexos.mjs); muda so o modo e o tamanho do lote.
on:
  # Disparo MANUAL apenas (cockpit ou `gh workflow run extrair-ocr.yml`).
  workflow_dispatch:
    inputs:
      limite:
        description: "Tamanho do fetch por iteracao (vazio = 50; OCR e caro, manter lote pequeno). O run re-busca em loop ate a fila esgotar ou o budget acabar."
        type: string
        required: false
      ocr_timeout_ms:
        description: "Teto de tempo do Tika POR anexo no modo OCR, em ms (vazio = 600000 = 10min). Escaneado grande precisa de mais que o timeout do passo rapido."
        type: string
        required: false
      tika_task_timeout_ms:
        description: "Teto do watchdog INTERNO do Tika (taskTimeoutMillis) na inicializacao do servidor, em ms (vazio = 900000 = 15min). DEVE ser >= ocr_timeout_ms, senao o Tika rejeita o X-Tika-Timeout-Millis com HTTP 500."
        type: string
        required: false

concurrency:
  group: extrair-ocr
  cancel-in-progress: false

jobs:
  extrair-ocr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar deps do runner
        working-directory: .github/scripts
        run: npm install --no-audit --no-fund

      # Tika efemero via `docker run` (NAO service container) para ampliar o
      # watchdog INTERNO (taskTimeoutMillis, default 300s): NAO pode ser
      # sobreposto pelo header X-Tika-Timeout-Millis (o header so REDUZ por
      # requisicao). Sem isso o OCR de escaneado grande (>5min) era morto aos
      # 300s e o Tika rejeitava qualquer timeout maior com HTTP 500.
      #
      # O Tika 3.x NAO aceita -taskTimeoutMillis como flag de CLI (Unrecognized
      # Option -> exit 255). So da para configurar via tika-config XML passado
      # com -c. Os args apos a imagem viram `$0 $@` do entrypoint =>
      #   TikaServerCli -h 0.0.0.0 -c /tika-config.xml
      # Config so com <server><params>: os parsers default (inclui Tesseract no
      # `full`) continuam carregados por auto-deteccao, OCR segue funcionando.
      - name: Subir Tika (full, OCR) com taskTimeoutMillis ampliado
        run: |
          cat > "$RUNNER_TEMP/tika-config.xml" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <properties>
            <server>
              <params>
                <taskTimeoutMillis>${{ github.event.inputs.tika_task_timeout_ms || '900000' }}</taskTimeoutMillis>
              </params>
            </server>
          </properties>
          EOF
          cat "$RUNNER_TEMP/tika-config.xml"
          docker run -d --name tika -p 9998:9998 \
            -v "$RUNNER_TEMP/tika-config.xml:/tika-config.xml:ro" \
            apache/tika:latest-full -c /tika-config.xml

      - name: Aguardar Tika ficar pronto
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9998/version >/dev/null; then
              echo "Tika pronto: $(curl -s http://localhost:9998/version)"
              exit 0
            fi
            echo "aguardando Tika... ($i)"
            sleep 2
          done
          echo "Tika nao respondeu a tempo" >&2
          exit 1

      # Drena SO a fila 'precisa_ocr' (EXTRACAO_MODO=ocr) com OCR ligado. Lote
      # pequeno por padrao (50) porque OCR e caro; o healthcheck do Tika no
      # orquestrador aborta o run cedo se o servico cair.
      - name: Extrair OCR (orquestrador camada 1, modo ocr)
        env:
          TIKA_ENDPOINT: http://localhost:9998
          EXTRACAO_MODO: ocr
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CRON_DISPATCH_SECRET: ${{ secrets.CRON_DISPATCH_SECRET }}
          NOMUS_API_KEY: ${{ secrets.NOMUS_API_KEY }}
          # Lote pequeno por padrao (OCR caro); cockpit pode passar outro valor.
          EXTRACAO_LIMITE: ${{ github.event.inputs.limite || '50' }}
          # Timeout proprio do OCR (default 10min): escaneado grande estoura o
          # teto curto do passo rapido. Vazio => default do script (600000).
          OCR_TIMEOUT_MS: ${{ github.event.inputs.ocr_timeout_ms || '600000' }}
        run: node .github/scripts/extrair-anexos.mjs

      # Diagnostico (decisao Fabio 2026-06-16): os logs do service container
      # Tika NAO aparecem no `gh run view`. Este passo (sempre, mesmo apos falha)
      # inspeciona o container Tika e imprime o flag OOMKilled + exit code (137 =
      # morto por OOM) e as ultimas linhas do log -> confirma se o Tika caiu por
      # falta de memoria durante o OCR de um anexo pesado (ex.: zip de escaneados).
      - name: Diagnostico Tika (OOM / exit code / log)
        if: always()
        run: |
          echo "=== containers ==="
          docker ps -a --no-trunc || true
          for id in $(docker ps -aq); do
            img=$(docker inspect --format '{{.Config.Image}}' "$id" 2>/dev/null || echo '?')
            case "$img" in
              *tika*)
                echo "===== Tika container $id ($img) ====="
                docker inspect --format 'ExitCode={{.State.ExitCode}} OOMKilled={{.State.OOMKilled}} Status={{.State.Status}}' "$id" || true
                echo "----- ultimas 150 linhas do log do Tika -----"
                docker logs "$id" 2>&1 | tail -150 || true
                ;;
            esac
          done
