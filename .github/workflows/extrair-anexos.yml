name: Extrator de anexos (camada 1)

# Camada 1 do pipeline de documentos: extracao de TEXTO PURO de anexos
# (editais, contratos, atas, planilhas...), deterministica e ZERO LLM.
#
# Motor = Apache Tika imagem `full` (Tesseract OCR embutido), rodando como
# SERVICO EFEMERO neste job (bloco services:). Sobe junto com o job, o runner
# fala em localhost:9998, e morre com o job => zero infra parada, custo so nos
# minutos do Actions. Mesma filosofia do coletor Nomus.
#
# O runner Node le os parametros em config_extracao (Supabase) no inicio do
# job (administravel pelo cockpit, sem hardcode) e usa o miolo agnostico em
# .github/scripts/extrator.mjs (bytes+nome -> texto+hashes).
#
# FLUXO: o orquestrador extrair-anexos.mjs pede ao Edge documentos-ingerir os
# VINCULOS pendentes (+ config_extracao), obtem os bytes de cada anexo pelo
# ADAPTADOR da fonte (nomus/effecti), extrai o texto via Tika e empurra de
# volta ao Edge, que faz dedup global + grava texto + indexa.
on:
  # Schedule TEMPORARIO para drenar o backfill da fila (~11k anexos) sem disparo
  # manual: cada run consome lotes de 500 em loop ate ~5h (budget do orquestrador),
  # o restante fica para o proximo run. Quando a fila zerar, REMOVER este bloco
  # (os runs agendados passam a sair em segundos com "Nenhum vinculo pendente").
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      limite:
        description: "Tamanho do fetch por iteracao (vazio = 500, teto do Edge). O run re-busca em loop ate a fila esgotar ou o budget de tempo acabar."
        type: string
        required: false
      folder_id:
        description: "PILOTO Drive: id da pasta do Google Drive a descobrir (vazio = nao mexe no Drive, so drena a fila Nomus/Effecti)."
        type: string
        required: false

concurrency:
  group: extrair-anexos
  cancel-in-progress: false

jobs:
  extrair:
    runs-on: ubuntu-latest

    # Servico Tika efemero: morre com o job. `full` traz Tesseract para OCR.
    # TODO(prod): fixar a tag em uma versao especifica em vez de latest.
    services:
      tika:
        image: apache/tika:latest-full
        ports:
          - 9998:9998

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Dependencias dos runners (ex: adm-zip para descompactar ZIP na camada 1).
      # Isolado em .github/scripts/package.json para nao instalar o app Next.js.
      - name: Instalar deps do runner
        working-directory: .github/scripts
        run: npm install --no-audit --no-fund

      - name: Aguardar Tika ficar pronto
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9998/version >/dev/null; then
              echo "Tika pronto: $(curl -s http://localhost:9998/version)"
              exit 0
            fi
            echo "aguardando Tika... ($i)"
            sleep 2
          done
          echo "Tika nao respondeu a tempo" >&2
          exit 1

      # PILOTO Drive: so quando o disparo informa folder_id. Lista a pasta
      # (recursivo) e enfileira vinculos via Edge documentos-descobrir. O step
      # de extracao abaixo consome a fila (sem filtro de fonte) e baixa pelo
      # adaptador 'drive'. Runs agendados/sem folder_id pulam este step.
      - name: Descobrir anexos do Drive (piloto)
        if: ${{ github.event.inputs.folder_id != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CRON_DISPATCH_SECRET: ${{ secrets.CRON_DISPATCH_SECRET }}
          DRIVE_FOLDER_ID: ${{ github.event.inputs.folder_id }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: node .github/scripts/descobrir-drive.mjs

      - name: Extrair anexos (orquestrador camada 1)
        env:
          TIKA_ENDPOINT: http://localhost:9998
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CRON_DISPATCH_SECRET: ${{ secrets.CRON_DISPATCH_SECRET }}
          NOMUS_API_KEY: ${{ secrets.NOMUS_API_KEY }}
          # Credencial Drive para o adaptador 'drive' baixar os bytes (alt=media).
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          # Teto opcional de vinculos por run (vazio = config_extracao do cockpit).
          EXTRACAO_LIMITE: ${{ github.event.inputs.limite }}
        run: node .github/scripts/extrair-anexos.mjs
