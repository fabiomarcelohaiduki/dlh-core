name: Coletor Nomus (nuvem)

# run-name inclui o RECURSO e o MODO no titulo do run. Isso e o que permite ao
# guard do cockpit (Edge nomus-disparar) distinguir runs por recurso pela GitHub
# API, que NAO expoe os inputs do dispatch na listagem de runs.
run-name: "Coletor Nomus · ${{ github.event.inputs.recurso || 'processos' }} · ${{ github.event.inputs.modo || 'incremental' }}"

# Coleta os processos do Nomus a partir da NUVEM (runner Node/OpenSSL) e faz
# push para a Edge Function nomus-ingerir, que persiste no Supabase reusando o
# pipeline do cockpit. Roda na nuvem porque o Supabase Edge (Deno) nao conecta
# no Nomus por incompatibilidade TLS (cifra CBC legada).
#
# Acionamento: o RELOGIO vive no cockpit (config_ingestao do Nomus), nao mais
# aqui. O job pg_cron 'coleta-nomus' chama a GitHub API (workflow_dispatch) na
# cadencia configurada no painel; ajuste a frequencia/horario pelo card da fonte
# Nomus (Fontes -> Nomus -> Agendamento da coleta). O disparo manual abaixo
# segue valido para backfill 'full' sob demanda.
on:
  workflow_dispatch:
    inputs:
      modo:
        description: "Modo de coleta"
        type: choice
        default: incremental
        options:
          - incremental
          - full
      recurso:
        description: "Recurso/modulo do Nomus a coletar"
        type: string
        default: processos
      gatilho:
        description: "Origem do disparo (manual|agendada)"
        type: string
        default: agendada

# Concurrency POR RECURSO: o lock do cockpit (nomus-ingerir) e por (fonte_id,
# recurso), entao recursos distintos (processos, pessoas, ...) rodam em PARALELO,
# cada um single-flight no seu proprio group. Dois disparos do MESMO recurso a 2a
# fica na fila (cancel-in-progress: false preserva o cursor de backfill).
concurrency:
  group: coletar-nomus-${{ github.event.inputs.recurso || 'processos' }}
  cancel-in-progress: false

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Coletar Nomus e enviar ao Supabase
        env:
          # Modo: disparo manual escolhe; o agendado diario manda 'full'.
          # Recurso/modulo: default 'processos' (unico coletor vivo hoje).
          NOMUS_MODO: ${{ github.event.inputs.modo || 'incremental' }}
          NOMUS_RECURSO: ${{ github.event.inputs.recurso || 'processos' }}
          # Gatilho: disparo manual manda 'manual'; o agendado/cron cai em 'agendada'.
          NOMUS_GATILHO: ${{ github.event.inputs.gatilho || 'agendada' }}
          NOMUS_API_KEY: ${{ secrets.NOMUS_API_KEY }}
          NOMUS_BASE_URL: ${{ secrets.NOMUS_BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CRON_DISPATCH_SECRET: ${{ secrets.CRON_DISPATCH_SECRET }}
        run: node .github/scripts/coletar-nomus.mjs

      # Descoberta da camada 1 apos a coleta: enfileira os vinculos pendentes dos
      # processos recem-persistidos (Edge documentos-descobrir -> SQL puro sobre
      # nomus_processos, idempotente). Espelha o Gmail/Drive, que ja descobrem na
      # coleta. continue-on-error: a descoberta e best-effort (visivel no log),
      # nao marca o run em vermelho se falhar — a coleta ja gravou os dados.
      - name: Descobrir anexos do Nomus (camada 1)
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CRON_DISPATCH_SECRET: ${{ secrets.CRON_DISPATCH_SECRET }}
        run: |
          curl -fsS -X POST "$SUPABASE_URL/functions/v1/documentos-descobrir" \
            -H "Content-Type: application/json" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "X-Cron-Secret: $CRON_DISPATCH_SECRET" \
            -d '{"fonte":"nomus"}'
