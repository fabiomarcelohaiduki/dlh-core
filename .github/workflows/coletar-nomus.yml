name: Coletor Nomus (nuvem)

# Coleta os processos do Nomus a partir da NUVEM (runner Node/OpenSSL) e faz
# push para a Edge Function nomus-ingerir, que persiste no Supabase reusando o
# pipeline do cockpit. Roda na nuvem porque o Supabase Edge (Deno) nao conecta
# no Nomus por incompatibilidade TLS (cifra CBC legada).
#
# Acionamento: o RELOGIO vive no cockpit (config_ingestao do Nomus), nao mais
# aqui. O job pg_cron 'coleta-nomus' chama a GitHub API (workflow_dispatch) na
# cadencia configurada no painel; ajuste a frequencia/horario pelo card da fonte
# Nomus (Fontes -> Nomus -> Agendamento da coleta). O disparo manual abaixo
# segue valido para backfill 'full' sob demanda.
on:
  workflow_dispatch:
    inputs:
      modo:
        description: "Modo de coleta"
        type: choice
        default: incremental
        options:
          - incremental
          - full
      recurso:
        description: "Recurso/modulo do Nomus a coletar"
        type: string
        default: processos

# Garante que duas execucoes nao rodem em paralelo (alinhado ao single-flight
# global do cockpit, que recusaria a 2a com 409).
concurrency:
  group: coletar-nomus
  cancel-in-progress: false

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Coletar Nomus e enviar ao Supabase
        env:
          # Modo: disparo manual escolhe; o agendado diario manda 'full'.
          # Recurso/modulo: default 'processos' (unico coletor vivo hoje).
          NOMUS_MODO: ${{ github.event.inputs.modo || 'incremental' }}
          NOMUS_RECURSO: ${{ github.event.inputs.recurso || 'processos' }}
          NOMUS_API_KEY: ${{ secrets.NOMUS_API_KEY }}
          NOMUS_BASE_URL: ${{ secrets.NOMUS_BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CRON_DISPATCH_SECRET: ${{ secrets.CRON_DISPATCH_SECRET }}
        run: node .github/scripts/coletar-nomus.mjs
