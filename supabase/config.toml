project_id = "qvggrrirsjidtqsdvmxf"

# Chamada pelo pg_cron com X-Cron-Secret puro (SEM header Authorization). Se o
# verify_jwt ficar no default (ON), o GATEWAY do Supabase barra com 401
# {UNAUTHORIZED_NO_AUTH_HEADER} antes do codigo rodar -> ciclo agendado morto
# em silencio. A funcao se autentica sozinha (assertInternalAuth: X-Cron-Secret
# do Vault OU service_role bearer), entao desligar a checagem do gateway aqui e
# seguro. Sem este pin, todo `supabase functions deploy` sem --no-verify-jwt
# reabre o bug.
[functions.ingestao-orquestrar]
verify_jwt = false

# O callback do OAuth do Drive chega SEM Authorization (o navegador vem do
# Google), e o runner chama 'access-token' so com X-Cron-Secret. Com verify_jwt
# no default (ON) o gateway barraria ambos antes do codigo. A funcao se
# autentica sozinha (sessao / state CSRF / X-Cron-Secret), entao desligar a
# checagem do gateway aqui e seguro. Sem este pin, deploy sem --no-verify-jwt
# reabre o bug.
[functions.drive-oauth]
verify_jwt = false

# Mesma razao do drive-oauth: o callback do OAuth do Gmail chega SEM
# Authorization (navegador vindo do Google) e o runner chama 'access-token' so
# com X-Cron-Secret. A funcao se autentica sozinha (sessao / state CSRF /
# X-Cron-Secret). Sem este pin, deploy sem --no-verify-jwt reabre o bug 401.
[functions.gmail-oauth]
verify_jwt = false

# Backfill de indexacao auto-encadeado: reenfileirar_indexacao() dispara este
# Edge via pg_net com X-Cron-Secret PURO (sem Authorization). Com verify_jwt no
# default (ON) o gateway barraria a cadeia com 401 antes do codigo -> backfill
# morto em silencio. A funcao se autentica sozinha (assertInternalAuth:
# X-Cron-Secret do Vault OU service_role bearer). Sem este pin, deploy sem
# --no-verify-jwt reabre o bug.
[functions.documentos-indexar]
verify_jwt = false

# Busca semantica do acervo /v1: autentica via authenticateV1 (API key da Lia
# lia_sk_ no Vault OU sessao do cockpit). A API key NAO e um JWT, entao com
# verify_jwt no default (ON) o gateway barra o Bearer lia_sk_ com
# {UNAUTHORIZED_INVALID_JWT_FORMAT} antes do codigo. A funcao se autentica
# sozinha (compara em tempo constante / recai p/ sessao humana) e devolve 401
# quando falta credencial. Sem este pin, deploy sem --no-verify-jwt reabre o
# bug e a Lia nao consegue chamar a tool.
[functions.v1-acervo-busca-semantica]
verify_jwt = false

# Leitura integral de documento do acervo /v1: mesma autenticacao da busca
# (API key da Lia lia_sk_ no Vault OU sessao do cockpit via authenticateV1).
# A API key NAO e JWT -> sem este pin o gateway barra o Bearer lia_sk_ com
# {UNAUTHORIZED_INVALID_JWT_FORMAT} antes do codigo. Sem o pin, deploy sem
# --no-verify-jwt reabre o bug e a Lia nao consegue chamar a tool.
[functions.v1-acervo-ler-documento]
verify_jwt = false

# SQL read-only no substrato tabular /v1 (tool #4 do RAG): mesma autenticacao
# das outras tools (API key da Lia lia_sk_ no Vault OU sessao do cockpit via
# authenticateV1). A API key NAO e JWT -> sem este pin o gateway barra o Bearer
# lia_sk_ com {UNAUTHORIZED_INVALID_JWT_FORMAT} antes do codigo. Sem o pin,
